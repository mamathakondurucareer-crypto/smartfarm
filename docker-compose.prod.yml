# ── Production environment ────────────────────────────────────────────────────
# Ports: db=5433  backend=8002  mobile=8083
# Seed:  minimal (roles + 1 admin user only)
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-smartfarm}
      POSTGRES_USER:     ${POSTGRES_USER:-smartfarm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartfarm}"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL:       postgresql://${POSTGRES_USER:-smartfarm}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-smartfarm}
      SECRET_KEY:         ${SECRET_KEY}
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY:-}
      ALLOWED_ORIGINS:    ${ALLOWED_ORIGINS:-http://localhost:8083}
      ADMIN_USERNAME:     ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL:        ${ADMIN_EMAIL:-admin@smartfarm.in}
      ADMIN_PASSWORD:     ${ADMIN_PASSWORD}
      DEBUG:              "false"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -m backend.seeds.seed_prod && uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    ports:
      - "8083:8081"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata_prod:
