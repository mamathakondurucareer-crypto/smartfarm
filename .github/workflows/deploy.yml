name: Deploy SmartFarm

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - test
          - prod
      branch:
        description: "Branch for test (leave blank for main). Ignored for prod — prod always deploys main."
        required: false
        default: ""

# Prevent concurrent deploys to the same environment
concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: self-hosted          # your Mac registered as a GitHub Actions runner
    environment: ${{ github.event.inputs.environment }}   # uses environment-scoped secrets

    steps:
      # ── 1. Determine branch — prod is always locked to main ─────────────────
      - name: Resolve branch
        id: branch
        run: |
          ENV="${{ github.event.inputs.environment }}"
          INPUT="${{ github.event.inputs.branch }}"
          if [ "$ENV" = "prod" ]; then
            echo "ref=main" >> "$GITHUB_OUTPUT"
          elif [ -n "$INPUT" ]; then
            echo "ref=$INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      # ── 2. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout ${{ steps.branch.outputs.ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.ref }}

      # ── 3. Create clean Docker config (no keychain) ─────────────────────────
      - name: Configure Docker credential store
        run: |
          mkdir -p /tmp/docker-ci-config
          # Copy CLI plugins so docker-compose plugin remains discoverable
          if [ -d "$HOME/.docker/cli-plugins" ]; then
            cp -r "$HOME/.docker/cli-plugins" /tmp/docker-ci-config/cli-plugins
          fi
          # Clean config with no credsStore — bypasses locked macOS keychain
          printf '{"auths":{}}' > /tmp/docker-ci-config/config.json

      # ── 4. Write .env.prod from GitHub environment secrets (test uses committed .env.test) ──
      - name: Write .env.prod (from secrets)
        if: github.event.inputs.environment == 'prod'
        run: |
          cat > ".env.prod" <<EOF
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          DEBUG=false
          EOF

      # ── 5. Deploy ────────────────────────────────────────────────────────────
      - name: Deploy ${{ github.event.inputs.environment }}
        env:
          DOCKER_CONFIG: /tmp/docker-ci-config
        run: |
          ENV="${{ github.event.inputs.environment }}"
          docker compose \
            -f "docker-compose.${ENV}.yml" \
            --env-file ".env.${ENV}" \
            -p "smartfarm_${ENV}" \
            up -d --build --remove-orphans

      # ── 6. Health check ──────────────────────────────────────────────────────
      - name: Wait for backend health
        run: |
          ENV="${{ github.event.inputs.environment }}"
          PORT=$( [ "$ENV" = "prod" ] && echo "8002" || echo "8003" )
          echo "Waiting for backend on port $PORT..."
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:${PORT}/api/health" > /dev/null 2>&1; then
              echo "Backend is healthy."
              exit 0
            fi
            echo "  attempt $i/30 — sleeping 5s"
            sleep 5
          done
          echo "ERROR: Backend did not become healthy in time."
          docker compose -f "docker-compose.${ENV}.yml" -p "smartfarm_${ENV}" logs backend
          exit 1

      # ── 7. Cleanup temp .env.prod (do not remove committed .env.test) ──────────
      - name: Remove .env.prod
        if: always() && github.event.inputs.environment == 'prod'
        run: rm -f ".env.prod"

      # ── 8. Summary ───────────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          ENV="${{ github.event.inputs.environment }}"
          PORT=$( [ "$ENV" = "prod" ] && echo "8083" || echo "8084" )
          BACKEND=$( [ "$ENV" = "prod" ] && echo "8002" || echo "8003" )
          echo "### Deployed to $ENV" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service  | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | http://localhost:${PORT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend  | http://localhost:${BACKEND}/docs |" >> "$GITHUB_STEP_SUMMARY"
